name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.3'
        channel: 'stable'

    - name: Create Android platform
      run: |
        echo "🔨 Creating Android platform..."
        rm -rf android ios temp_project
        flutter create --platforms=android --org com.example --project-name insect_detector temp_project
        mv temp_project/android ./
        rm -rf temp_project
        
        if [ ! -d "android" ]; then
          echo "❌ Failed to create Android platform"
          exit 1
        fi
        echo "✅ Android platform created"

    - name: Configure Gradle
      run: |
        echo "🔧 Configuring Gradle..."
        
        rm -f android/build.gradle.kts android/app/build.gradle.kts android/settings.gradle.kts
        
        mkdir -p android/gradle/wrapper
        cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-all.zip
        EOF
        
        cat > android/settings.gradle << 'EOF'
        pluginManagement {
            def flutterSdkPath = {
                def properties = new Properties()
                file("local.properties").withInputStream { properties.load(it) }
                def flutterSdkPath = properties.getProperty("flutter.sdk")
                assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                return flutterSdkPath
            }()
            includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        plugins {
            id "dev.flutter.flutter-plugin-loader" version "1.0.0"
            id "com.android.application" version "8.7.0" apply false
            id "org.jetbrains.kotlin.android" version "1.9.22" apply false
        }
        include ":app"
        EOF
        
        cat > android/build.gradle << 'EOF'
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
            
            configurations.all {
                resolutionStrategy {
                    force 'androidx.core:core:1.13.1'
                    force 'androidx.core:core-ktx:1.13.1'
                    force 'androidx.activity:activity:1.9.0'
                    force 'androidx.fragment:fragment:1.7.1'
                    force 'androidx.annotation:annotation:1.8.0'
                    force 'androidx.lifecycle:lifecycle-runtime:2.7.0'
                    force 'androidx.lifecycle:lifecycle-viewmodel:2.7.0'
                    force 'androidx.lifecycle:lifecycle-livedata:2.7.0'
                    force 'androidx.lifecycle:lifecycle-process:2.7.0'
                    force 'androidx.window:window:1.2.0'
                    force 'androidx.window:window-java:1.2.0'
                    force 'androidx.tracing:tracing:1.2.0'
                    force 'androidx.concurrent:concurrent-futures:1.1.0'
                    force 'androidx.interpolator:interpolator:1.0.0'
                    force 'androidx.collection:collection:1.4.0'
                    force 'androidx.collection:collection-jvm:1.4.0'
                    force 'androidx.exifinterface:exifinterface:1.3.7'
                    force 'androidx.savedstate:savedstate:1.2.1'
                    force 'androidx.arch.core:core-common:2.2.0'
                    force 'androidx.arch.core:core-runtime:2.2.0'
                    force 'androidx.startup:startup-runtime:1.1.1'
                    force 'androidx.profileinstaller:profileinstaller:1.3.1'
                    force 'androidx.annotation:annotation-experimental:1.4.1'
                    force 'androidx.versionedparcelable:versionedparcelable:1.1.1'
                    force 'androidx.lifecycle:lifecycle-livedata-core:2.7.0'
                    force 'androidx.lifecycle:lifecycle-livedata-core-ktx:2.7.0'
                    force 'androidx.lifecycle:lifecycle-viewmodel-savedstate:2.7.0'
                    force 'androidx.loader:loader:1.0.0'
                    force 'androidx.viewpager:viewpager:1.0.0'
                    force 'androidx.customview:customview:1.0.0'
                    force 'androidx.core:core-viewtree:1.0.0'
                }
            }
        }
        
        rootProject.buildDir = '../build'
        subprojects {
            project.buildDir = "${rootProject.buildDir}/${project.name}"
        }
        subprojects {
            project.evaluationDependsOn(':app')
        }
        tasks.register("clean", Delete) { delete rootProject.buildDir }
        EOF
        
        cat > android/app/build.gradle << 'EOF'
        plugins {
            id "com.android.application"
            id "kotlin-android"
            id "dev.flutter.flutter-gradle-plugin"
        }
        def localProperties = new Properties()
        def localPropertiesFile = rootProject.file('local.properties')
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
        }
        def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
        def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'
        android {
            namespace "com.example.insect_detector"
            compileSdk 34
            ndkVersion "27.0.12077973"
            compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
            kotlinOptions { jvmTarget = '17' }
            defaultConfig {
                applicationId "com.example.insect_detector"
                minSdk 26
                targetSdk 34
                versionCode flutterVersionCode.toInteger()
                versionName flutterVersionName
            }
            buildTypes {
                release {
                    signingConfig signingConfigs.debug
                    minifyEnabled false
                    shrinkResources false
                }
            }
        }
        flutter { source '../..' }
        EOF
        echo "✅ Gradle configured (minSdk 26 + NDK 27.0.12077973)"

    - name: Copy AndroidManifest
      run: |
        if [ -f "custom_android/AndroidManifest.xml" ]; then
          cp custom_android/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          echo "✅ Manifest copied"
        fi

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK
      run: |
        echo "🏗️ Building APK (release mode)..."
        flutter build apk --release --no-tree-shake-icons
        echo "✅ APK built successfully"
        ls -la build/app/outputs/flutter-apk/

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: insect-detector-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30

    - name: Commit android folder
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add android/
        git commit -m "Add Android platform folder" || echo "No changes"
        git push || echo "No changes"
